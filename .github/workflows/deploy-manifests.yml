name: deploy-manifests

on:
  push:
    branches:
      - master
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
env:
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.CLUSTER_NAME }}

    - name: Remove applications from the cluster
      run: |
        # The topology has been fully rolled back to the pre-consolidation
        # (known-good) state of one MongoDB StatefulSet per service. The single
        # shared `gaming-mongo` instance introduced by the consolidation must be
        # removed; it is not covered by any current manifest, and `kubectl apply`
        # never prunes resources whose manifests were deleted (idempotent).
        kubectl delete statefulset gaming-mongo-depl --ignore-not-found
        kubectl delete service gaming-mongo-srv --ignore-not-found
        kubectl delete pvc gaming-mongo-data-gaming-mongo-depl-0 --ignore-not-found
        # The application is currently down and the reverted manifests are
        # unchanged, so `kubectl apply` alone would be a no-op and would NOT
        # restart the failed pods. Remove the application Deployments so the
        # apply below recreates them fresh. Per-service MongoDB StatefulSets and
        # their PVCs are intentionally left intact to preserve data.
        kubectl delete deployments -l 'app in (gaming-auth,gaming-bet,gaming-event,gaming-gamemaster,gaming-moderation,gaming-resulting,gaming-slip,gaming-backoffice,gaming-client)' --ignore-not-found

    - name: Apply Kubernetes manifests
      run: |
        # Apply cert-manager ClusterIssuer first (CRDs installed by provision.sh)
        kubectl apply -f infra/k8s-prod/cert-issuer.yaml
        # Apply core services
        kubectl apply -f infra/k8s
        # Apply prod-specific ingress (TLS + domain)
        kubectl apply -f infra/k8s-prod/ingress-srv.yaml
        # Apply prod HTTPS fallback ingress for immediate trusted cert validation
        kubectl apply -f infra/k8s-prod/ingress-srv-nip.yaml
