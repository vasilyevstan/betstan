name: deploy-manifests

on:
  push:
    branches:
      - master
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
env:
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.CLUSTER_NAME }}

    - name: Remove obsolete per-service MongoDB resources
      run: |
        # The 8 per-service MongoDBs were consolidated into a single shared
        # `gaming-mongo` instance. `kubectl apply` does not prune resources whose
        # manifests were deleted, so the old StatefulSets would keep running and
        # over-commit the node. Explicitly delete them (idempotent).
        for svc in auth backoffice bet event gamemaster moderation resulting slip; do
          kubectl delete statefulset "gaming-${svc}-mongo-depl" --ignore-not-found
          kubectl delete service "gaming-${svc}-mongo-srv" --ignore-not-found
          # StatefulSet PVCs are not garbage-collected automatically.
          kubectl delete pvc "gaming-${svc}-mongo-data-gaming-${svc}-mongo-depl-0" --ignore-not-found
        done

    - name: Apply Kubernetes manifests
      run: |
        # Apply cert-manager ClusterIssuer first (CRDs installed by provision.sh)
        kubectl apply -f infra/k8s-prod/cert-issuer.yaml
        # Apply core services
        kubectl apply -f infra/k8s
        # Apply prod-specific ingress (TLS + domain)
        kubectl apply -f infra/k8s-prod/ingress-srv.yaml
        # Apply prod HTTPS fallback ingress for immediate trusted cert validation
        kubectl apply -f infra/k8s-prod/ingress-srv-nip.yaml
