apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gaming-mongo-depl
spec:
  serviceName: gaming-mongo-srv
  replicas: 1
  selector:
    matchLabels:
      app: gaming-mongo
  template:
    metadata:
      labels:
        app: gaming-mongo
    spec:
      containers:
        - name: gaming-mongo
          image: mongo
          volumeMounts:
            - name: gaming-mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: gaming-mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gaming-mongo-srv
spec:
  type: ClusterIP
  selector:
    app: gaming-mongo
  ports:
    - name: gaming-mongo-port
      protocol: TCP
      port: 27017
      targetPort: 27017
